name: Publish a release to PyPI

on:
  workflow_dispatch:
    inputs:
      test_pypi:
        type: boolean
        default: false
        description: "Publish to the test PyPI instance, https://test.pypi.org/"

jobs:
  build:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Set up PDM
      uses: pdm-project/setup-pdm@v4
      with:
        python-version: "3.11"
    - name: Install build dependencies
      run: pdm install -G test
    - name: Build Python source dist + wheel
      run: pdm build
    - name: Build Rust wheels
      run: pdm run rust-build
    - name: Publish adam_core to Test PyPI
      if: ${{ inputs.test_pypi }}
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.TEST_PYPI_SECRET }}
        repository-url: https://test.pypi.org/legacy/
    - name: Publish adam_core to PyPI
      if: ${{ ! inputs.test_pypi }}
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_SECRET }}
